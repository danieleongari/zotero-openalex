<vbox onload="initOpenAlexPreferencesPane()" xmlns:html="http://www.w3.org/1999/xhtml">
  <groupbox>
    <label value="OpenAlex API key" />

    <html:input
      id="openalex-api-key-input"
      type="password"
      autocomplete="off"
      style="width: 32em; max-width: 100%"
    />
    <description> Stored locally in Zotero preferences. Not written to Zotero items. </description>

    <hbox align="center">
      <button id="openalex-api-key-clear" label="Clear" />
      <button id="openalex-api-key-test" label="Test connection" />
    </hbox>
    <description id="openalex-api-key-status" style="min-height: 1.4em" />

    <h2>Custom Settings</h2>

    <checkbox id="auto-update-on-startup" label="Check items for updates at startup" />

    <hbox align="center">
      <label value="Months after which the number of citations is updated:" />
      <html:input
        id="stale-months"
        type="number"
        min="1"
        max="36"
        style="width: 4em; max-width: 100%; margin-inline-start: 0.5em"
      />
    </hbox>

    <checkbox
      id="openalex-correct-arxiv"
      label="Correct arXiv articles: change 'Item Type' to 'preprint' and set DOI if missing"
    />

    <checkbox
      id="openalex-show-graph-tuning-controls"
      label="Show graph tuning controls in the Citation Graph window"
    />

    <h2>Co-Authors</h2>

    <hbox align="center">
      <label value="Minimum h-index shown in Co-Authors:" />
      <html:input
        id="minimum-author-h-index"
        type="number"
        min="0"
        max="1000"
        step="1"
        style="width: 5em; max-width: 100%; margin-inline-start: 0.5em"
      />
    </hbox>
    <description>
      Authors below this value, or without cached h-index metadata, are hidden. Authors exactly at
      the threshold remain visible. Set 0 to disable the numeric cutoff.
    </description>

    <h2>Metadata Cache</h2>

    <description id="openalex-cache-works-count">Works metadata: Loading…</description>
    <description id="openalex-cache-authors-count">Authors metadata: Loading…</description>
    <hbox align="center">
      <button id="openalex-cache-clean" label="Clean metadata cache…" />
    </hbox>
    <description>
      Compares the cache with non-deleted items in your Zotero user and group libraries, then
      removes unreferenced Works and Authors. This does not make network requests.
    </description>
    <description id="openalex-cache-status" style="min-height: 1.4em" />
  </groupbox>
</vbox>
